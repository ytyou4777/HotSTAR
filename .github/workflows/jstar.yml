name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/10 * * * *'   # runs every 10 minutes (adjust as needed)
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Jio and Hotstar Updates
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys
          from urllib.parse import urlparse

          m3u_file = "jiostar.m3u"
          jio_worker = "https://zstar.pfy.workers.dev"
          hotstar_worker = "https://voot.vodep39240327.workers.dev?voot.m3u"

          try:
              # ----- FETCH JIO DATA (token + base URL) -----
              jio_res = requests.get(jio_worker, timeout=15)
              jio_text = jio_res.text

              # Extract __hdnea__ token
              jio_match = re.search(r'__hdnea__=([^"\'\s&]+)', jio_text)
              jio_token = f"__hdnea__={jio_match.group(1)}" if jio_match else None

              # Extract the latest base URL for Jio streams
              # Look for any URL like http(s)://something.cdn.jio.com
              base_match = re.search(r'(https?://[a-zA-Z0-9.-]+\.cdn\.jio\.com)', jio_text)
              new_base_url = base_match.group(1) if base_match else None
              if new_base_url:
                  print(f"New Jio base URL found: {new_base_url}")
              else:
                  print("No new base URL found in worker response – domain will not be updated.")

              # ----- FETCH HOTSTAR TOKEN -----
              hs_res = requests.get(hotstar_worker, timeout=20)
              hs_match = re.search(r'hdntl=exp=[^&"\'\s]+', hs_res.text)
              hs_token = hs_match.group(0) if hs_match else None

              # ----- READ PLAYLIST -----
              if not os.path.exists(m3u_file):
                  print(f"Error: {m3u_file} not found")
                  sys.exit(1)

              with open(m3u_file, 'r', encoding='utf-8') as f:
                  lines = f.readlines()

              updated_lines = []
              updated_headers = 0
              updated_domains = 0

              for line in lines:
                  stripped = line.strip()

                  # Keep empty lines
                  if not stripped:
                      updated_lines.append(line)
                      continue

                  # ----- HOTSTAR LINES -----
                  if "#EXTHTTP" in stripped and "hdntl" in stripped and hs_token:
                      updated_line = re.sub(r'hdntl=exp=[^"}]+', hs_token, stripped)
                      updated_lines.append(updated_line + "\n")
                  elif "hotstar.com" in stripped and hs_token:
                      updated_line = re.sub(r'hdntl=exp=[^&|]+', hs_token, stripped)
                      updated_lines.append(updated_line + "\n")

                  # ----- JIO LINES -----
                  # First, update the domain if a new base URL was found
                  elif "cdn.jio.com" in stripped and "jiotv" in stripped and new_base_url:
                      # Parse the original URL to extract the path and query
                      original_url = stripped.split()[0] if stripped.startswith('http') else stripped
                      parsed = urlparse(original_url)
                      # Build new URL with new base domain + original path + query
                      new_url = new_base_url + parsed.path
                      if parsed.query:
                          new_url += "?" + parsed.query
                      # Replace the URL part in the line (preserve possible trailing spaces/comments)
                      stripped = stripped.replace(original_url, new_url)
                      updated_domains += 1

                  # Update the #EXTHTTP line containing __hdnea__
                  if "#EXTHTTP" in stripped and "__hdnea__" in stripped and jio_token:
                      updated_line = re.sub(r'__hdnea__=[^"}]+', jio_token, stripped)
                      updated_lines.append(updated_line + "\n")
                      updated_headers += 1

                  # Update the Jio stream URL (the line after #EXTHTTP or standalone)
                  elif "cdn.jio.com" in stripped and "jiotv" in stripped:
                      if jio_token:
                          # If URL already has __hdnea__, replace it
                          if "__hdnea__=" in stripped:
                              updated_line = re.sub(r'__hdnea__=[^&]+', jio_token, stripped)
                          else:
                              # No token present – add it with proper separator
                              separator = '&' if '?' in stripped else '?'
                              updated_line = stripped + separator + jio_token
                          updated_lines.append(updated_line + "\n")
                      else:
                          # No token available – remove any existing __hdnea__ to avoid stale token
                          clean_link = re.sub(r'([?&])__hdnea__=[^&]*', '', stripped)
                          updated_lines.append(clean_link + "\n")

                  # ----- EVERYTHING ELSE (keep unchanged) -----
                  else:
                      updated_lines.append(line)

              # Write back the updated playlist
              with open(m3u_file, 'w', encoding='utf-8') as f:
                  f.writelines(updated_lines)

              print("Successfully updated Jio and Hotstar tokens in jiostar.m3u")
              if new_base_url:
                  print(f"Updated domain for {updated_domains} Jio stream URLs to {new_base_url}")
              print(f"Updated {updated_headers} Jio EXTHTTP headers.")

          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes detected (Tokens and domains are already up‑to‑date)"
            exit 0
          fi
          git commit -m "Automated update: Refreshed Jio & Hotstar tokens and Jio base domain"
          git push