name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Playlist
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys

          m3u_file = "jiostar.m3u"

          # ✅ FORCE CORRECT DOMAIN (MAIN FIX)
          FORCE_JIO_DOMAIN = "jiotvbpkmob.cdn.jio.com"

          jio_worker = "https://jtv.pfy.workers.dev/"
          hotstar_worker = "https://voot.vodep39240327.workers.dev/?voot.m3u"

          try:
              print("Fetching tokens...")

              # ===== JIO TOKEN =====
              jio_token = None
              try:
                  res = requests.get(jio_worker, timeout=15)
                  match = re.search(r'__hdnea__=([^"\'\s&]+)', res.text)
                  if match:
                      jio_token = "__hdnea__=" + match.group(1)
                      print("Jio token fetched")
                  else:
                      print("Jio token not found")
              except Exception as e:
                  print("Jio error:", e)

              # ===== HOTSTAR TOKEN =====
              hs_token = None
              try:
                  res = requests.get(hotstar_worker, timeout=20)
                  match = re.search(r'hdntl=exp=[^&"\'\s]+', res.text)
                  if match:
                      hs_token = match.group(0)
                      print("Hotstar token fetched")
                  else:
                      print("Hotstar token not found")
              except Exception as e:
                  print("Hotstar error:", e)

              # ===== FILE CHECK =====
              if not os.path.exists(m3u_file):
                  print("File not found:", m3u_file)
                  sys.exit(1)

              with open(m3u_file, "r", encoding="utf-8") as f:
                  lines = f.readlines()

              updated = []

              for i in range(len(lines)):
                  line = lines[i].strip()

                  # keep empty lines
                  if not line:
                      updated.append(lines[i])
                      continue

                  # ================= REMOVE TOKEN FROM ANY TEXT =================
                  if "__hdnea__" in line and not line.startswith("#EXTHTTP") and not line.startswith("http"):
                      clean = re.sub(r'\?__hdnea__=[^"\s]+', '', line)
                      updated.append(clean + "\n")
                      continue

                  # ================= CLEAN EXTINF =================
                  if "#EXTINF" in line:
                      clean = re.sub(r'\?__hdnea__=[^",]+', '', line)
                      clean = re.sub(r'hdntl=exp=[^",]+', '', clean)
                      updated.append(clean + "\n")
                      continue

                  # ================= HOTSTAR =================
                  if hs_token and ("hotstar" in line or "hdntl=" in line):
                      new = re.sub(r'hdntl=exp=[^&"\s]+', hs_token, line)
                      updated.append(new + "\n")
                      continue

                  # ================= JIO =================
                  if "cdn.jio.com" in line:

                      # ---- FIX EXTHTTP ----
                      if "#EXTHTTP" in line:
                          if jio_token:
                              new = f'#EXTHTTP:{{"cookie":"{jio_token}"}}'
                          else:
                              new = '#EXTHTTP:{}'
                          updated.append(new + "\n")
                          continue

                      # ---- FIX URL ----
                      if "http" in line:

                          # 🔥 FORCE DOMAIN REPLACE
                          line = re.sub(
                              r'https://[^/]+\.cdn\.jio\.com',
                              f'https://{FORCE_JIO_DOMAIN}',
                              line
                          )

                          # remove old token
                          line = re.sub(r'([?&])__hdnea__=[^&]*', '', line)

                          # add new token
                          if jio_token:
                              sep = '&' if '?' in line else '?'
                              line = line + sep + jio_token

                          updated.append(line + "\n")
                          continue

                  # ================= DEFAULT =================
                  updated.append(lines[i])

              # ===== SAVE FILE =====
              with open(m3u_file, "w", encoding="utf-8") as f:
                  f.writelines(updated)

              print("✅ DONE - FULL FIX APPLIED")

          except Exception as e:
              print("Fatal Error:", e)
              sys.exit(1)
          EOF

      - name: Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Auto Fix: Domain + Token + Clean Playlist"
          git push
