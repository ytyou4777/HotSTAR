name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Jio and Hotstar Updates
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys
          import json

          m3u_file = "jiostar.m3u"
          jio_worker = "https://zio.vodep39240327.workers.dev"
          hotstar_worker = "https://netx.streamstar18.workers.dev/hot1"

          try:
              print("Fetching tokens...")

              # ================= JIO TOKEN =================
              jio_token = None
              try:
                  jio_res = requests.get(jio_worker, timeout=15)
                  jio_match = re.search(r'__hdnea__=([^"\'\s&]+)', jio_res.text)
                  if jio_match:
                      jio_token = f"__hdnea__={jio_match.group(1)}"
                      print("✅ Jio token fetched")
                  else:
                      print("❌ Jio token not found")
              except Exception as e:
                  print(f"Jio fetch error: {e}")

              # ================= HOTSTAR TOKEN =================
              hs_token = None
              try:
                  hs_res = requests.get(hotstar_worker, timeout=20)

                  # Try JSON parse
                  try:
                      data = hs_res.json()

                      # Case 1: direct token
                      if isinstance(data, dict):
                          for value in data.values():
                              if isinstance(value, str) and "hdntl=" in value:
                                  hs_token = re.search(r'hdntl=[^&"]+', value).group(0)
                                  break

                      print("Hotstar JSON parsed")

                  except:
                      print("Hotstar not JSON, fallback regex")

                  # Fallback regex
                  if not hs_token:
                      hs_match = re.search(r'hdntl=[^"\'\s]+', hs_res.text)
                      if hs_match:
                          hs_token = hs_match.group(0)

                  if hs_token:
                      print("✅ Hotstar token fetched:", hs_token[:50])
                  else:
                      print("❌ Hotstar token not found")

              except Exception as e:
                  print(f"Hotstar fetch error: {e}")

              # ================= FILE CHECK =================
              if not os.path.exists(m3u_file):
                  print(f"Error: {m3u_file} not found")
                  sys.exit(1)

              with open(m3u_file, 'r', encoding='utf-8') as f:
                  lines = f.readlines()

              updated_lines = []
              jio_updates = 0
              hotstar_updates = 0

              for line in lines:
                  stripped = line.strip()

                  if not stripped:
                      updated_lines.append(line)
                      continue

                  # ================= JIO =================
                  if jio_token:
                      if stripped.startswith(('http://', 'https://')) and 'jio' in stripped.lower():
                          if '__hdnea__=' in stripped:
                              updated_line = re.sub(r'__hdnea__=[^&]+', jio_token, stripped)
                          else:
                              separator = '&' if '?' in stripped else '?'
                              updated_line = stripped + separator + jio_token

                          updated_lines.append(updated_line + "\n")
                          jio_updates += 1
                          continue

                  # ================= HOTSTAR =================
                  if hs_token:
                      if stripped.startswith(('http://', 'https://')) and 'hotstar' in stripped.lower():
                          if 'hdntl=' in stripped:
                              updated_line = re.sub(r'hdntl=[^&]+', hs_token, stripped)
                          else:
                              separator = '&' if '?' in stripped else '?'
                              updated_line = stripped + separator + hs_token

                          updated_lines.append(updated_line + "\n")
                          hotstar_updates += 1
                          continue

                  # ================= DEFAULT =================
                  updated_lines.append(line)

              # ================= SAVE =================
              with open(m3u_file, 'w', encoding='utf-8') as f:
                  f.writelines(updated_lines)

              print("✅ Update completed")
              print(f"Jio updated: {jio_updates}")
              print(f"Hotstar updated: {hotstar_updates}")

          except Exception as e:
              print(f"Fatal Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Auto Update: Jio & Hotstar tokens refreshed"
          git push
