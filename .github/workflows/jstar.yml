name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Jio and Hotstar Updates
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys

          m3u_file = "jiostar.m3u"
          jio_worker = "https://zio.vodep39240327.workers.dev"

          try:
              print("Fetching tokens...")

              # ================= JIO TOKEN =================
              jio_token = None
              try:
                  jio_res = requests.get(jio_worker, timeout=15)
                  match = re.search(r'__hdnea__=([^"\'\s&]+)', jio_res.text)
                  if match:
                      jio_token = "__hdnea__=" + match.group(1)
                      print("✅ Jio token fetched")
              except Exception as e:
                  print("Jio error:", e)

              # ================= FILE =================
              if not os.path.exists(m3u_file):
                  print("M3U file not found")
                  sys.exit(1)

              with open(m3u_file, "r", encoding="utf-8") as f:
                  lines = f.readlines()

              updated_lines = []
              jio_updates = 0
              hotstar_fixed = 0

              for line in lines:
                  stripped = line.strip()

                  if not stripped:
                      updated_lines.append(line)
                      continue

                  # ================= JIO FIX (ONLY STREAM URL) =================
                  if (
                      jio_token and
                      "jio" in stripped.lower() and
                      (".m3u8" in stripped or ".mpd" in stripped)
                  ):

                      clean = stripped

                      # remove old tokens
                      clean = re.sub(r'(\?|&)__hdnea__=[^&]+', '', clean)

                      clean = clean.rstrip('?&')

                      # add only once
                      sep = '&' if '?' in clean else '?'
                      updated = clean + sep + jio_token

                      updated_lines.append(updated + "\n")
                      jio_updates += 1
                      continue

                  # ================= HOTSTAR CLEAN =================
                  if "hotstar" in stripped.lower():

                      clean = stripped

                      clean = re.sub(r'\|Cookie="[^"]*"', '', clean)
                      clean = re.sub(r'(\?|&)hdntl=[^&]+', '', clean)

                      clean = clean.replace("',", "").replace("'", "").strip()
                      clean = clean.rstrip('?&')

                      updated_lines.append(clean + "\n")
                      hotstar_fixed += 1
                      continue

                  # ================= EXTHTTP FIX =================
                  if stripped.startswith("#EXTHTTP"):

                      clean = stripped.replace("',", "").replace("'", "")

                      clean = re.sub(r'__hdnea__=[^"]+', '', clean)
                      clean = re.sub(r'hdntl=[^"]+', '', clean)

                      updated_lines.append(clean + "\n")
                      continue

                  # ================= DEFAULT =================
                  updated_lines.append(line)

              # ================= SAVE =================
              with open(m3u_file, "w", encoding="utf-8") as f:
                  f.writelines(updated_lines)

              print("✅ DONE")
              print("Jio Fixed:", jio_updates)
              print("Hotstar Fixed:", hotstar_fixed)

          except Exception as e:
              print("Fatal:", e)
              sys.exit(1)
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Final Fix: Jio only on streams + Hotstar clean"
          git push
