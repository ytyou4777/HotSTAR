name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests

      - name: Process Playlist
        run: |
          python <<EOF
          import requests, re, os, sys

          file = "jiostar.m3u"
          jio_worker = "https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u"
          hotstar_worker = "https://netx.streamstar18.workers.dev/hot1"

          # ================= TOKENS =================
          jio_token = None
          hs_token = None

          try:
              r = requests.get(jio_worker, timeout=15)
              m = re.search(r'__hdnea__=([^"\'\s&]+)', r.text)
              if m:
                  jio_token = "__hdnea__=" + m.group(1)
                  print("Jio OK")
          except:
              print("Jio Fail")

          try:
              r = requests.get(hotstar_worker, timeout=20)
              m = re.search(r'hdntl=[^"\'\s]+', r.text)
              if m:
                  hs_token = m.group(0).strip().rstrip(',"\'')

                  print("Hotstar OK")
          except:
              print("Hotstar Fail")

          if not os.path.exists(file):
              print("No file")
              sys.exit(1)

          with open(file, "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          pending_exthttp = None

          for i, line in enumerate(lines):
              s = line.strip()

              if not s:
                  new_lines.append(line)
                  continue

              # remove bad EXTHTTP (we rebuild it)
              if s.startswith("#EXTHTTP"):
                  continue

              # keep EXTINF
              if s.startswith("#EXTINF"):
                  new_lines.append(line)
                  continue

              # ================= URL LINE =================
              if s.startswith("http"):

                  clean = s

                  # remove garbage
                  clean = re.sub(r'\|Cookie="[^"]*"', '', clean)
                  clean = re.sub(r'(\?|&)hdntl=[^&]+', '', clean)
                  clean = re.sub(r'(\?|&)__hdnea__=[^&]+', '', clean)
                  clean = clean.replace("',", "").replace("'", "").strip()
                  clean = clean.rstrip('?&')

                  exthttp = ""

                  # ===== JIO =====
                  if jio_token and "jio" in clean.lower() and (".m3u8" in clean or ".mpd" in clean):
                      sep = '&' if '?' in clean else '?'
                      clean = clean + sep + jio_token
                      exthttp = f'#EXTHTTP:{{"Cookie":"{jio_token}"}}'

                  # ===== HOTSTAR =====
                  elif hs_token and "hotstar" in clean.lower():
                      exthttp = f'#EXTHTTP:{{"Cookie":"{hs_token}","Origin":"https://www.hotstar.com","Referer":"https://www.hotstar.com/"}}'

                  # add EXTHTTP before URL
                  if exthttp:
                      new_lines.append(exthttp + "\n")

                  new_lines.append(clean + "\n")
                  continue

              # default
              new_lines.append(line)

          # save
          with open(file, "w", encoding="utf-8") as f:
              f.writelines(new_lines)

          print("✅ FULL FIX DONE")
          EOF

      - name: Commit
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "bot"
          git add jiostar.m3u
          git commit -m "FINAL FIX: Jio + Hotstar + EXTHTTP PERFECT" || echo "No changes"
          git push
