name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Playlist
        run: |
          python <<EOF
          import requests
          import re
          import os
          import sys

          m3u_file = "jiostar.m3u"
          jio_worker = "https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u"
          hotstar_worker = "https://voot.vodep39240327.workers.dev/?voot.m3u"

          try:
              print("Fetching tokens...")

              # ===== JIO TOKEN =====
              jio_token = None
              try:
                  res = requests.get(jio_worker, timeout=15)
                  match = re.search(r'__hdnea__=([^"\'\s&]+)', res.text)
                  if match:
                      jio_token = "__hdnea__=" + match.group(1)
                      print("Jio token fetched")
                  else:
                      print("Jio token not found")
              except Exception as e:
                  print("Jio error:", e)

              # ===== HOTSTAR TOKEN =====
              hs_token = None
              try:
                  res = requests.get(hotstar_worker, timeout=20)
                  match = re.search(r'hdntl=exp=[^&"\'\s]+', res.text)
                  if match:
                      hs_token = match.group(0)
                      print("Hotstar token fetched")
                  else:
                      print("Hotstar token not found")
              except Exception as e:
                  print("Hotstar error:", e)

              # ===== FILE CHECK =====
              if not os.path.exists(m3u_file):
                  print("File not found:", m3u_file)
                  sys.exit(1)

              with open(m3u_file, "r", encoding="utf-8") as f:
                  lines = f.readlines()

              updated = []
              jio_count = 0
              hotstar_count = 0

              for line in lines:
                  stripped = line.strip()

                  # keep empty
                  if not stripped:
                      updated.append(line)
                      continue

                  # ================= CLEAN NAME =================
                  if "#EXTINF" in stripped and "__hdnea__" in stripped:
                      clean = re.sub(r'\?__hdnea__=[^",]+', '', stripped)
                      updated.append(clean + "\n")
                      continue

                  # ================= HOTSTAR =================
                  if hs_token and ("hotstar.com" in stripped or "hdntl=" in stripped):
                      new = re.sub(r'hdntl=exp=[^&"\'\s]+', hs_token, stripped)
                      updated.append(new + "\n")
                      hotstar_count += 1
                      continue

                  # ================= JIO =================
                  if "jio" in stripped.lower():

                      # FIX EXTHTTP
                      if "#EXTHTTP" in stripped:
                          if jio_token:
                              new = re.sub(r'__hdnea__=[^"}]+', jio_token, stripped)
                          else:
                              new = re.sub(r'__hdnea__=[^"}]+', '', stripped)
                          updated.append(new + "\n")
                          continue

                      # FIX URL
                      if "http" in stripped:
                          if jio_token:
                              if "__hdnea__=" in stripped:
                                  new = re.sub(r'__hdnea__=[^&]+', jio_token, stripped)
                              else:
                                  sep = '&' if '?' in stripped else '?'
                                  new = stripped + sep + jio_token
                          else:
                              new = re.sub(r'([?&])__hdnea__=[^&]*', '', stripped)

                          updated.append(new + "\n")
                          jio_count += 1
                          continue

                  # ================= DEFAULT =================
                  updated.append(line)

              # ===== SAVE =====
              with open(m3u_file, "w", encoding="utf-8") as f:
                  f.writelines(updated)

              print("✅ DONE")
              print("Jio updated:", jio_count)
              print("Hotstar updated:", hotstar_count)

          except Exception as e:
              print("Fatal Error:", e)
              sys.exit(1)
          EOF

      - name: Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Auto Update: Clean names + refresh tokens"
          git push
