name: Update JioStar Playlist

on:
  schedule:
    - cron: '0 */1 * * *'   # runs every hour
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and merge latest playlists
        run: |
          python <<EOF
          import requests
          import os
          import sys

          M3U_FILE = "jiostar.m3u"
          JIO_WORKER = "https://raw.githubusercontent.com/pk3011/pkjtv/refs/heads/main/jtv.m3u"
          HOTSTAR_WORKER = "https://voot.vodep39240327.workers.dev?voot.m3u"

          def fetch_playlist(url):
              try:
                  resp = requests.get(url, timeout=20)
                  resp.raise_for_status()
                  return resp.text.splitlines()
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          def merge_playlists(jio_lines, hs_lines):
              merged = []
              header_added = False
              for lines in (jio_lines, hs_lines):
                  if lines and lines[0].startswith("#EXTM3U"):
                      if not header_added:
                          merged.append(lines[0])
                          header_added = True
                      start = 1
                  else:
                      start = 0
                  if lines:
                      merged.extend(lines[start:])
              return merged

          def main():
              jio = fetch_playlist(JIO_WORKER)
              hs = fetch_playlist(HOTSTAR_WORKER)

              if jio is None or hs is None:
                  print("Failed to fetch one or both playlists. Exiting without changes.")
                  sys.exit(1)

              combined = merge_playlists(jio, hs)

              with open(M3U_FILE, 'w', encoding='utf-8') as f:
                  f.write("\n".join(combined))

              print(f"Successfully updated {M3U_FILE} with latest Jio and Hotstar links.")

          if __name__ == "__main__":
              main()
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiostar.m3u
          if git diff --cached --quiet; then
            echo "No changes detected (playlists are identical)"
            exit 0
          fi
          git commit -m "Automated update: refreshed Jio and Hotstar playlists"
          git push
